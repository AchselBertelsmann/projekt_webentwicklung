{% extends "base.html" %}

{% block index %}
<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">ISO</th>
      <th scope="col">Format</th>
      <th scope="col">Typ</th>
    </tr>
  </thead>
  <tbody>
        {% for film in filme %}
    <tr>
      <th scope="row">{{ film["id"] }}</th>
      <td>{{ film["name"] }}</td>
      <td>{{ film["iso"] }}</td>
      <td>{{ film["format"] }}</td>
      <td>{{ film["typ"] }}</td>
    </tr>
        {% endfor %}    
  </tbody>
</table>{% endblock %}
