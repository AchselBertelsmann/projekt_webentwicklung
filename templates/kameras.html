{% extends "base.html" %}

{% block index %}
<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">Baujahr</th>
      <th scope="col">Kameratyp</th>
    </tr>
  </thead>
  <tbody>
        {% for kamera in kameras %}
    <tr>
      <th scope="row">{{ kamera["id"] }}</th>
      <td>{{ kamera["name"] }}</td>
      <td>{{ kamera["baujahr"] }}</td>
      <td>{{ kamera["kameratyp"] }}</td>
    </tr>
        {% endfor %}    
  </tbody>
</table>{% endblock %}
